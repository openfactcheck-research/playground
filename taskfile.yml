# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

silent: true

set: [pipefail]
shopt: [globstar]

includes:
  print:
    taskfile: ./taskfiles/common.taskfile.yml
    internal: true
  setup:
    taskfile: ./taskfiles/setup.taskfile.yml
  check:
    taskfile: ./taskfiles/check.taskfile.yml
  release:
    taskfile: ./taskfiles/release.taskfile.yml
  deploy:
    taskfile: ./taskfiles/deploy.taskfile.yml
  dev:
    taskfile: ./taskfiles/dev.taskfile.yml

tasks:
  list:
    desc: Show all available tasks
    cmds:
      - task --list --sort alphanumeric

  default:
    cmds:
      - |
        printf '{{.COLOR_CYAN}}{{.APP_NAME}} {{.APP_VERSION}}{{.COLOR_RESET}} ({{.COMMIT}})\n'
        printf '{{.COLOR_YELLOW}}Environment:{{.COLOR_RESET}} %s\n\n' "${ENV:-development}"

        printf '{{.COLOR_CYAN}}Namespaces{{.COLOR_RESET}}\n'
        printf '  dev      Frontend development (dev, build, lint)\n'
        printf '  release  Release workflow (bumps version, tags, CI deploys)\n'
        printf '  deploy   Infrastructure (init, plan, apply, destroy)\n'
        printf '  check    Verify dependencies\n\n'

        printf '{{.COLOR_CYAN}}Examples{{.COLOR_RESET}}\n'
        printf '  task dev                           Start dev server\n'
        printf '  task deploy TARGET=<target>        Deploy infra changes\n\n'

        printf '{{.COLOR_YELLOW}}Run "task --list" for all tasks{{.COLOR_RESET}}\n'

  env:
    desc: Display the active environment
    cmds:
      - printf 'Environment{{":"}} {{.COLOR_YELLOW}}%s{{.COLOR_RESET}}\n' "$ENV"
