# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  default:
    desc: Validate local environment configuration.
    deps:
      - root
    cmds:
      - task: :print:success
        vars:
          MSG: ✓ All checks passed

  root:
    desc: Verify task is run from repository root
    internal: true
    cmds:
      - bash taskfiles/check.helpers.sh force_root
