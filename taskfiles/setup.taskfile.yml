# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  default:
    desc: Install all required tools
    cmds:
      - task: :print:header
        vars:
          MSG: Setting up tools
      - task: pnpm
      - task: jq
      - task: tfenv
      - task: tflint
      - printf '\n'
      - task: :print:success
        vars:
          MSG: ✓ All tools ready

  pnpm:
    desc: Ensure pnpm is installed
    internal: true
    cmds:
      - bash taskfiles/setup.helpers.sh ensure_tool pnpm "npm install -g pnpm"

  jq:
    desc: Ensure jq is installed
    internal: true
    cmds:
      - bash taskfiles/setup.helpers.sh ensure_tool jq

  tfenv:
    desc: Ensure tfenv is installed
    internal: true
    cmds:
      - bash taskfiles/setup.helpers.sh ensure_tool tfenv

  tflint:
    desc: Ensure tflint is installed
    internal: true
    cmds:
      - bash taskfiles/setup.helpers.sh ensure_tool tflint
