# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  dev:
    desc: Start development server
    cmds:
      - pnpm dev

  build:
    desc: Type-check and build for production
    cmds:
      - pnpm build

  deploy:
    desc: Build and deploy to S3 + CloudFront (TARGET=<environment>)
    dir: '{{.ROOT_DIR}}'
    requires:
      vars: [TARGET]
    cmds:
      - pnpm build
      - |
        source taskfiles/deploy.helpers.sh 2>/dev/null || source ./taskfiles/deploy.helpers.sh
        prepare "{{.TARGET}}" "base" || exit 1

        # Get AWS profile from tfvars
        AWS_PROFILE=$(jq -r .aws_profile "$VAR_FILE")

        cd deployments/base
        tofu workspace select $WORKSPACE 2>/dev/null
        BUCKET=$(tofu output -raw website_bucket_name)
        DISTRIBUTION_ID=$(tofu output -raw cloudfront_distribution_id)
        WEBSITE_URL=$(tofu output -raw website_url)
        cd {{.ROOT_DIR}}

        # Sync to S3
        printf '{{.COLOR_CYAN}}Uploading to S3...{{.COLOR_RESET}}\n'
        aws s3 sync dist/ s3://$BUCKET --delete --profile "$AWS_PROFILE"

        # Invalidate CloudFront cache
        printf '{{.COLOR_CYAN}}Invalidating CloudFront cache...{{.COLOR_RESET}}\n'
        aws cloudfront create-invalidation --distribution-id "$DISTRIBUTION_ID" --paths "/*" --profile "$AWS_PROFILE" > /dev/null

        printf '{{.COLOR_GREEN}}✓ Deployed to: %s{{.COLOR_RESET}}\n' "$WEBSITE_URL"

  preview:
    desc: Preview production build locally
    cmds:
      - pnpm preview

  lint:
    desc: Run ESLint
    cmds:
      - pnpm lint

  lint:fix:
    desc: Run ESLint with auto-fix
    cmds:
      - pnpm lint:fix

  prepare:
    desc: Setup Husky git hooks
    cmds:
      - pnpm prepare

  install:
    desc: Install dependencies
    cmds:
      - pnpm install

  clean:
    desc: Remove build artifacts and node_modules
    cmds:
      - rm -rf dist node_modules .vite

  default:
    desc: Start development server
    cmds:
      - task: dev
