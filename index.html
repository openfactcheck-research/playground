<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenFactCheck Playground</title>
    <meta
      name="description"
      content="Build and test fact-checking pipelines with a visual block-based editor. Verify claims using AI-powered verification workflows."
    />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Fonts: Geist (sans) + Geist Mono — vercel.com/font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&display=swap"
    />

    <!-- Theme color -->
    <meta name="theme-color" content="#005355" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="OpenFactCheck Playground" />
    <meta
      property="og:description"
      content="Build and test fact-checking pipelines with a visual block-based editor."
    />
    <meta property="og:image" content="/favicon.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="OpenFactCheck Playground" />
    <meta
      name="twitter:description"
      content="Build and test fact-checking pipelines with a visual block-based editor."
    />
  </head>
  <body>
    <script>
      // Apply saved theme before Vue renders to prevent flash
      ;(function () {
        var theme = localStorage.getItem('theme')
        var dark = theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)
        if (dark) {
          document.documentElement.classList.add('dark')
          document.documentElement.style.colorScheme = 'dark'
        }
      })()
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
