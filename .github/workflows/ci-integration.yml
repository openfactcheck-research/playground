name: CI Integration

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Task
        uses: go-task/setup-task@v2

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: task app:lint

  deploy:
    name: Deploy to Integration
    needs: [lint]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Task
        uses: go-task/setup-task@v2

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Install dependencies
        run: pnpm install

      - name: Write deployment config
        run: |
          mkdir -p deployments/environments deployments/accounts
          echo '${{ secrets.INTEGRATION_TFVARS }}' > deployments/environments/integration.tfvars.json
          echo '${{ secrets.HASANIQBAL_DEV_BACKEND_CONF }}' > deployments/accounts/hasaniqbal-dev.backend.conf

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_INTEGRATION }}
          aws-region: us-east-1

      - name: Write AWS profile
        run: |
          aws configure set aws_access_key_id "$AWS_ACCESS_KEY_ID" --profile hasaniqbal-dev
          aws configure set aws_secret_access_key "$AWS_SECRET_ACCESS_KEY" --profile hasaniqbal-dev
          aws configure set aws_session_token "$AWS_SESSION_TOKEN" --profile hasaniqbal-dev
          aws configure set region us-east-1 --profile hasaniqbal-dev

      - name: Deploy infrastructure
        run: task deploy TARGET=integration AUTO_APPROVE=true

      - name: Fetch app config from SSM
        run: |
          aws ssm get-parameters-by-path \
            --path /playground/integration/ \
            --with-decryption \
            --query "Parameters[*].[Name,Value]" \
            --output text | \
          awk -F'\t' '{n=$1; sub(".*/","",n); print n"="$2}' > .env.integration

      - name: Deploy app
        run: task app:deploy TARGET=integration
