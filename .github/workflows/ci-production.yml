name: CI Production

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  id-token: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Task
        uses: go-task/setup-task@v2

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: task dev:lint

  deploy:
    name: Deploy to Production
    needs: [lint]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Task
        uses: go-task/setup-task@v2

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Install dependencies
        run: pnpm install

      - name: Write deployment config
        run: |
          mkdir -p deployments/environments deployments/accounts
          echo '${{ secrets.PRODUCTION_TFVARS }}' > deployments/environments/production.tfvars.json
          echo '${{ secrets.HASANIQBAL_DEV_BACKEND_CONF }}' > deployments/accounts/hasaniqbal-dev.backend.conf

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PRODUCTION }}
          aws-region: us-east-1

      - name: Write AWS profile
        run: |
          aws configure set aws_access_key_id "$AWS_ACCESS_KEY_ID" --profile hasaniqbal-dev
          aws configure set aws_secret_access_key "$AWS_SECRET_ACCESS_KEY" --profile hasaniqbal-dev
          aws configure set aws_session_token "$AWS_SESSION_TOKEN" --profile hasaniqbal-dev
          aws configure set region us-east-1 --profile hasaniqbal-dev

      - name: Deploy infrastructure
        run: task deploy TARGET=production AUTO_APPROVE=true

      - name: Fetch app config from SSM
        run: |
          aws ssm get-parameters-by-path \
            --path /playground/production/ \
            --with-decryption \
            --query "Parameters[*].[Name,Value]" \
            --output text | \
          awk -F'\t' '{n=$1; sub(".*/","",n); print n"="$2}' > .env.production

      - name: Deploy app
        run: task deploy:app TARGET=production
