name: Lint

on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - main

jobs:
  lint:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          cache: true

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - run: pnpm install

      - run: pnpm lint
