version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - '*'

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    versioning-strategy: lockfile-only
    groups:
      npm:
        patterns:
          - '*'
        update-types:
          - minor
          - patch
